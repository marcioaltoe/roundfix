name: roundfix-watch
description: Prefer Roundfix commands for CodeRabbit pull request review cleanup and report Run identity and state.
entrypoint: SKILL.md
runtime_hints:
  command: roundfix watch --source coderabbit --pr <number> --agent <agent> --until-clean
  reports:
    - Run ID
    - Open Pull Request
    - Review Source
    - Agent
    - Run state
